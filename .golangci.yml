# golangci-lint config — aligned with Lex rules + Locus reference
# go-best-practices, code-smells, naming, hexagonal-architecture, solid-principles

run:
  timeout: 5m
  go: "1.25"
  tests: true

linters:
  disable-all: true
  enable:
    # --- Core / essential ---
    - errcheck        # never swallow errors
    - govet           # go vet checks (shadow, printf, etc.)
    - staticcheck     # comprehensive static analysis
    - unused          # dead code detection
    - ineffassign     # useless assignments
    - gosimple        # simplification suggestions
    - typecheck       # type checking

    # --- Lex: go-best-practices ---
    - goconst         # constants over embedded literals
    - errorlint       # wrap errors with %w, use errors.Is/As
    - nestif          # max nesting depth
    - gocritic        # switch over if-else, modern APIs, performance
    - bodyclose       # resource cleanup (HTTP response bodies)
    - prealloc        # pre-allocate slices when length known
    - thelper         # t.Helper() in test helpers

    # --- Lex: code-smells ---
    - gocyclo         # cyclomatic complexity
    - funlen          # function length
    - dupl            # code duplication

    # --- Lex: naming ---
    - revive          # naming conventions, style
    - misspell        # typos in comments and strings

    # --- Lex: hexagonal-architecture + solid ---
    - depguard        # dependency direction enforcement
    - goimports       # import grouping and formatting
    - unconvert       # unnecessary type conversions
    - unparam         # unused function parameters

    # --- Lex: error discipline ---
    - err113          # sentinel errors, no inline errors.New in returns
    - sloglint        # structured logging best practices
    - nolintlint      # require justification for //nolint

    # --- Security ---
    - gosec           # security issues

linters-settings:
  errcheck:
    check-type-assertions: false
    exclude-functions:
      - (io.Closer).Close
      - (net/http.ResponseWriter).Write
      - fmt.Fprint
      - fmt.Fprintf
      - fmt.Fprintln

  goconst:
    min-len: 2
    min-occurrences: 3

  errorlint:
    errorf: true
    asserts: true
    comparison: true

  nestif:
    min-complexity: 5

  gocritic:
    enabled-tags:
      - diagnostic
      - style
      - performance
      - opinionated
    settings:
      hugeParam:
        sizeThreshold: 256

  gocyclo:
    min-complexity: 20

  funlen:
    lines: 120
    statements: 70

  dupl:
    threshold: 100

  misspell:
    locale: US

  revive:
    rules:
      - name: exported
        disabled: true
      - name: unexported-return
        disabled: false
      - name: blank-imports
        disabled: false
      - name: context-as-argument
        disabled: false
      - name: error-return
        disabled: false
      - name: error-naming
        disabled: false
      - name: increment-decrement
        disabled: false
      - name: var-declaration
        disabled: false
      - name: range
        disabled: false
      - name: receiver-naming
        disabled: false

  depguard:
    rules:
      main:
        deny:
          - pkg: "^log$"
            desc: "use slog instead of stdlib log"

  prealloc:
    simple: true
    range-loops: true
    for-loops: false

  nolintlint:
    require-explanation: true
    require-specific: true

  sloglint:
    context: "all"
    static-msg: false
    no-raw-keys: false
    key-naming-case: snake

  thelper:
    test:
      begin: true

issues:
  exclude-use-default: true
  max-issues-per-linter: 0
  max-same-issues: 0
  exclude-dirs:
    - lsp/vscode/node_modules
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
        - funlen
        - dupl
        - goconst
        - gosec
        - err113
    - path: testkit/
      linters:
        - errcheck
        - unused
        - funlen
        - err113
