version: "2"
run:
  go: "1.25"
  tests: true
linters:
  default: none
  enable:
    - bodyclose
    - depguard
    - dupl
    - err113
    - errcheck
    - errorlint
    - funlen
    - goconst
    - gocritic
    - gocyclo
    - gosec
    - govet
    - ineffassign
    - misspell
    - nestif
    - nolintlint
    - prealloc
    - revive
    - sloglint
    - staticcheck
    - thelper
    - unconvert
    - unparam
    - unused
  settings:
    depguard:
      rules:
        main:
          deny:
            - pkg: ^log$
              desc: use slog instead of stdlib log
    dupl:
      threshold: 100
    errcheck:
      check-type-assertions: false
      exclude-functions:
        - (io.Closer).Close
        - (net/http.ResponseWriter).Write
        - fmt.Fprint
        - fmt.Fprintf
        - fmt.Fprintln
    errorlint:
      errorf: true
      asserts: true
      comparison: true
    funlen:
      lines: 120
      statements: 70
    goconst:
      min-len: 2
      min-occurrences: 3
    gocritic:
      enabled-tags:
        - diagnostic
        - style
        - performance
        - opinionated
      settings:
        hugeParam:
          sizeThreshold: 256
    gocyclo:
      min-complexity: 20
    misspell:
      locale: US
    nestif:
      min-complexity: 5
    nolintlint:
      require-explanation: true
      require-specific: true
    prealloc:
      simple: true
      range-loops: true
      for-loops: false
    revive:
      rules:
        - name: exported
          disabled: true
        - name: unexported-return
          disabled: false
        - name: blank-imports
          disabled: false
        - name: context-as-argument
          disabled: false
        - name: error-return
          disabled: false
        - name: error-naming
          disabled: false
        - name: increment-decrement
          disabled: false
        - name: var-declaration
          disabled: false
        - name: range
          disabled: false
        - name: receiver-naming
          disabled: false
    sloglint:
      context: all
      static-msg: false
      no-raw-keys: true
      key-naming-case: snake
    thelper:
      test:
        begin: true
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters:
          - dupl
          - err113
          - errcheck
          - funlen
          - goconst
          - gosec
          - sloglint
        path: _test\.go
      - linters:
          - err113
          - errcheck
          - funlen
          - unused
        path: testkit/
    paths:
      - lsp/vscode/node_modules
      - third_party$
      - builtin$
      - examples$
issues:
  max-issues-per-linter: 0
  max-same-issues: 0
formatters:
  enable:
    - goimports
  exclusions:
    generated: lax
    paths:
      - lsp/vscode/node_modules
      - third_party$
      - builtin$
      - examples$
