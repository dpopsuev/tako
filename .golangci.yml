run:
  timeout: 5m
  go: "1.24"

linters:
  enable:
    # Core (existing)
    - errcheck
    - govet
    - staticcheck
    - unused
    - gosimple
    - ineffassign
    - typecheck

    # Lex: constants over literals
    - goconst

    # Lex: sentinel errors + %w wrapping
    - errorlint

    # Lex: guard clauses, max nesting
    - nestif

    # Lex: style, performance, diagnostics
    - gocritic

    # Lex: pre-allocate slices
    - prealloc

    # Lex: spelling in comments
    - misspell

    # Lex: require justification for //nolint
    - nolintlint

    # Lex: structured logging conventions
    - sloglint

linters-settings:
  nestif:
    min-complexity: 4  # Lex rule: max nesting depth 3

  goconst:
    min-len: 3         # minimum string length to flag
    min-occurrences: 2 # flag if repeated 2+ times

  errorlint:
    errorf: true       # flag fmt.Errorf without %w
    asserts: true      # flag type assertions on errors
    comparison: true   # flag == comparison on errors

  gocritic:
    enabled-tags:
      - diagnostic
      - style
      - performance

  nolintlint:
    require-explanation: true
    require-specific: true

  sloglint:
    no-mixed-args: true     # forbid slog.Info("msg", "key", val, badVal)
    kv-only: true           # enforce key-value pairs, no positional args
    attr-only: false         # don't require slog.Attr (too strict)
    context: "all"          # require context in all slog calls
    static-msg: false        # allow dynamic messages
    no-raw-keys: false       # allow string keys (vs slog constants)
    key-naming-case: snake   # enforce snake_case keys

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
  exclude-dirs:
    - lsp/vscode/node_modules  # vendored JS/Go deps
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
        - goconst  # test strings repeat intentionally
