run:
  timeout: 5m
  go: "1.24"

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - gosimple
    - ineffassign
    - typecheck

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
  # Exclude test files from errcheck — test helpers often ignore errors intentionally
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
