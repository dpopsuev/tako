kind: Schematic
# D0-D4 Defect Court adversarial circuit.
# Antithesis path activates when Thesis F5 confidence is in the uncertain range.
# Edge evaluation logic is registered via BuildCourtEdgeFactory in Go.
circuit: defect-court
description: "D0-D4 adversarial review circuit"
zones:
  prosecution:
    nodes: [indict]
    approach: rapid
    stickiness: 0
  discovery:
    nodes: [discover, defend]
    approach: analytical
    stickiness: 2
  bench:
    nodes: [hearing, verdict, cmrr]
    approach: rigorous
    stickiness: 2

nodes:
  - name: indict
    approach: rapid
    instrument: node
    action: indict
  - name: discover
    approach: methodical
    instrument: node
    action: discover
  - name: defend
    approach: analytical
    instrument: node
    action: defend
  - name: hearing
    approach: holistic
    instrument: node
    action: hearing
  - name: verdict
    approach: rigorous
    instrument: node
    action: verdict
  - name: cmrr
    approach: methodical
    instrument: node
    action: cmrr

edges:
  - id: HD0
    name: indict to discover
    from: indict
    to: discover
    condition: "needs discovery phase"

  - id: HD0b
    name: discover to defend
    from: discover
    to: defend
    condition: "evidence gathered"

  - id: HD1
    name: fast-track
    from: indict
    to: defend
    shortcut: true
    condition: "prosecution confidence >= 0.95"

  - id: HD2
    name: plea-deal
    from: defend
    to: verdict
    shortcut: true
    condition: "defense concedes"

  - id: HD3
    name: motion-to-dismiss
    from: defend
    to: hearing
    condition: "defense has motion to dismiss"

  - id: HD4
    name: alternative-hypothesis
    from: defend
    to: hearing
    condition: "defense has alternative hypothesis"

  - id: HD5
    name: hearing-complete
    from: hearing
    to: verdict
    condition: "max rounds reached OR convergence"

  - id: HD6
    name: affirm
    from: verdict
    to: _done
    condition: "verdict == affirm"

  - id: HD7
    name: amend
    from: verdict
    to: _done
    condition: "verdict == amend"

  - id: HD8
    name: remand
    from: verdict
    to: indict
    loop: true
    condition: "verdict == remand AND remands < max_remands"

  - id: HD9
    name: acquit
    from: verdict
    to: _done
    condition: "verdict == acquit (evidence gap brief)"

  - id: HD12
    name: judge-mistrial
    from: verdict
    to: _done
    condition: "verdict == mistrial"

  - id: HD13
    name: cmrr-check
    from: hearing
    to: cmrr
    condition: "CMRR enabled and shared assumptions detected"

  - id: HD13b
    name: cmrr-return
    from: cmrr
    to: hearing
    loop: true
    condition: "shared premises flagged"

start: indict
done: _done
