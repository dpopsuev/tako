# Child circuit: used as a sub-circuit by subcircuit.yaml
# Tests: standalone circuit that can be delegated to via handler_type: circuit.
circuit: child
start: process
done: child-done
handler_type: transformer

nodes:
  - name: process
    handler: passthrough
    description: "Sub-circuit processing step"

edges:
  - id: process-done
    from: process
    to: child-done
