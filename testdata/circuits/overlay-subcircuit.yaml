kind: Schematic
# Combined overlay + sub-circuit: imports base, adds a circuit handler node.
# Tests: overlay merge + sub-circuit delegation in one circuit.
# This is the pattern consumers use (main circuit base + gather-code sub-circuit subgraph).
import: base
circuit: base

nodes:
  - name: delegate
    instrument: circuit
    action: child
    description: "Overlay-added node that delegates to a sub-circuit"
    edges:
      - name: delegate-done
        to: done
        when: "true"

edges:
  - id: process-done
    from: process
    to: delegate
