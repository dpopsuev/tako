kind: Schematic
# Base circuit for overlay testing.
# Consumer overlays import this and add/replace nodes and edges.
circuit: base
start: intake
done: done
nodes:
  - name: intake
    instrument: transformer
    action: passthrough
    description: "Base intake node"
  - name: process
    instrument: transformer
    action: passthrough
    description: "Base processing node"

edges:
  - id: intake-process
    from: intake
    to: process
  - id: process-done
    from: process
    to: done
