kind: schematic
# Intent Classifier Pattern
#
# Demonstrates provider resilience via fallback chains. The classify node
# dispatches to a primary provider; if it fails (rate limit, timeout, error),
# the ProviderRouter automatically falls back to secondary providers.
#
# Key primitives used:
#   - provider fallbacks → automatic retry with a different LLM backend
#   - node caching       → avoid re-classifying identical inputs within TTL
#   - merge: latest      → fan-in takes the most recent classification
#   - shortcut edge      → skip enrichment for high-confidence classifications
circuit: intent-classifier
description: "Classify user intent with provider fallback and caching"
handler_type: node

zones:
  ingestion:
    nodes: [preprocess]
    approach: analytical
    stickiness: 0
  classification:
    nodes: [classify, reclassify]
    approach: rapid
    stickiness: 2
  enrichment:
    nodes: [enrich]
    approach: methodical
    stickiness: 1
  output:
    nodes: [respond]
    approach: holistic
    stickiness: 0

nodes:
  - name: preprocess
    approach: analytical
    handler: transform
    prompt: "Normalize and tokenize the user input."

  - name: classify
    approach: rapid
    handler: classify
    provider: primary-llm
    prompt: "Classify the user's intent into one of: question, command, feedback, other."
    cache:
      ttl: 5m

  - name: reclassify
    approach: rapid
    handler: classify
    provider: primary-llm
    prompt: "Re-classify with additional context from enrichment."

  - name: enrich
    approach: methodical
    handler: enrich
    prompt: "Add context from user history and knowledge base."

  - name: respond
    approach: holistic
    handler: respond
    prompt: "Generate a response appropriate to the classified intent."

edges:
  - id: E1
    name: normalize input
    from: preprocess
    to: classify
    condition: "always"

  - id: E2-shortcut
    name: high confidence shortcut
    from: classify
    to: respond
    shortcut: true
    condition: "confidence >= 0.9"

  - id: E3
    name: needs enrichment
    from: classify
    to: enrich
    condition: "confidence < 0.9"

  - id: E4
    name: re-classify with context
    from: enrich
    to: reclassify
    merge: latest

  - id: E5
    name: final classification
    from: reclassify
    to: respond
    condition: "always"

  - id: E6
    name: done
    from: respond
    to: _done
    condition: "always (terminal)"

start: preprocess
done: _done
