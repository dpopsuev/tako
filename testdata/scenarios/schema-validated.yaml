kind: Schematic
circuit: schema-validated
description: "Circuit with artifact schema on every node for validation testing"
handler_type: transformer

nodes:
  - name: classify
    approach: rapid
    handler: echo
    schema:
      required: [type]
      properties:
        type: {type: string}
  - name: report
    approach: holistic
    handler: echo
    schema:
      required: [type]
      properties:
        type: {type: string}

edges:
  - id: E1
    name: classify to report
    from: classify
    to: report
    when: "true"
  - id: E2
    name: report to done
    from: report
    to: _done
    when: "true"

start: classify
done: _done
