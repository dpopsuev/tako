kind: Schematic
circuit: memory-test
description: "Simple 2-node circuit for verifying cross-walk MemoryStore persistence"
nodes:
  - name: process
    approach: rapid
    instrument: transformer
    action: echo
  - name: finish
    approach: analytical
    instrument: transformer
    action: echo

edges:
  - id: E1
    name: proceed
    from: process
    to: finish
    when: "true"
  - id: E2
    name: done
    from: finish
    to: _done
    when: "true"

start: process
done: _done
