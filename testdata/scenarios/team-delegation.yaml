kind: Schematic
circuit: team-delegation
description: "Parallel fan-out from coordinator to specialists, merge at synthesis"
handler_type: transformer

zones:
  coordination:
    nodes: [plan, synthesize]
    approach: methodical
    stickiness: 0
  research:
    nodes: [research_a, research_b]
    approach: analytical
    stickiness: 2

walkers:
  - name: coordinator
    approach: methodical
    persona: sentinel
    preamble: "Coordinate the investigation."
  - name: specialist-a
    approach: analytical
    persona: seeker
    preamble: "Research area A."
    step_affinity:
      research_a: 0.95
  - name: specialist-b
    approach: rapid
    persona: herald
    preamble: "Research area B."
    step_affinity:
      research_b: 0.95

nodes:
  - name: plan
    approach: methodical
    handler: echo
  - name: research_a
    approach: analytical
    handler: echo
  - name: research_b
    approach: rapid
    handler: echo
  - name: synthesize
    approach: methodical
    handler: echo

edges:
  - id: fan-a
    name: delegate to A
    from: plan
    to: research_a
    parallel: true
    when: "true"

  - id: fan-b
    name: delegate to B
    from: plan
    to: research_b
    parallel: true
    when: "true"

  - id: a-done
    name: A complete
    from: research_a
    to: synthesize
    when: "true"

  - id: b-done
    name: B complete
    from: research_b
    to: synthesize
    when: "true"

  - id: final
    name: synthesis done
    from: synthesize
    to: _done
    when: "true"

start: plan
done: _done
