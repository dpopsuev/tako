# D0-D4 Adversarial Dialectic circuit.
# Antithesis path activates when Thesis F5 confidence is in the uncertain range.
# Edge evaluation logic is registered via BuildDialecticEdgeFactory in Go.
circuit: defect-dialectic
description: "D0-D4 adversarial dialectic review circuit"
handler_type: node

zones:
  thesis:
    nodes: [indict]
    approach: rapid
    stickiness: 0
  discovery:
    nodes: [discover, defend]
    approach: analytical
    stickiness: 2
  synthesis:
    nodes: [hearing, verdict, cmrr]
    approach: rigorous
    stickiness: 2

nodes:
  - name: indict
    approach: rapid
    handler: indict
  - name: discover
    approach: methodical
    handler: discover
  - name: defend
    approach: analytical
    handler: defend
  - name: hearing
    approach: holistic
    handler: hearing
  - name: verdict
    approach: rigorous
    handler: verdict
  - name: cmrr
    approach: methodical
    handler: cmrr

edges:
  - id: HD0
    name: indict to discover
    from: indict
    to: discover
    condition: "needs discovery phase"

  - id: HD0b
    name: discover to defend
    from: discover
    to: defend
    condition: "evidence gathered"

  - id: HD1
    name: fast-track
    from: indict
    to: defend
    shortcut: true
    condition: "thesis confidence >= 0.95"

  - id: HD2
    name: concession
    from: defend
    to: verdict
    shortcut: true
    condition: "antithesis-holder concedes"

  - id: HD3
    name: partial-negation
    from: defend
    to: hearing
    condition: "antithesis-holder has partial negation"

  - id: HD4
    name: alternative-hypothesis
    from: defend
    to: hearing
    condition: "antithesis-holder has alternative hypothesis"

  - id: HD5
    name: dialectic-complete
    from: hearing
    to: verdict
    condition: "max rounds reached OR convergence"

  - id: HD6
    name: affirm
    from: verdict
    to: _done
    condition: "synthesis == affirm"

  - id: HD7
    name: amend
    from: verdict
    to: _done
    condition: "synthesis == amend"

  - id: HD8
    name: remand
    from: verdict
    to: indict
    loop: true
    condition: "synthesis == remand AND negations < max_negations"

  - id: HD9
    name: acquit
    from: verdict
    to: _done
    condition: "synthesis == acquit (evidence gap brief)"

  - id: HD12
    name: unresolved-contradiction
    from: verdict
    to: _done
    condition: "synthesis == unresolved"

  - id: HD13
    name: cmrr-check
    from: hearing
    to: cmrr
    condition: "CMRR enabled and shared assumptions detected"

  - id: HD13b
    name: cmrr-return
    from: cmrr
    to: hearing
    loop: true
    condition: "shared premises flagged"

start: indict
done: _done
