kind: schematic
# Signal Domains test circuit — exercises handler_type: renderer, domain:, and context_filter:.
circuit: signal-domains-test
description: "Test circuit for Renderer interface, zone domain annotations, and context filtering"

zones:
  ingestion:
    nodes: [ingest, extract]
    approach: rapid
    domain: unstructured
    context_filter:
      block: [raw_logs, debug_trace]
  analysis:
    nodes: [analyze, render]
    approach: analytical
    domain: structured
  output:
    nodes: [report]
    approach: holistic
    domain: hybrid

nodes:
  - name: ingest
    approach: rapid
    handler: llm
    handler_type: transformer
    prompt: "Ingest raw data"
  - name: extract
    approach: rapid
    handler: json-schema
    handler_type: extractor
    schema:
      type: object
      required: [category]
      properties:
        category:
          type: string
  - name: analyze
    approach: analytical
    handler: llm
    handler_type: transformer
    prompt: "Analyze structured data"
  - name: render
    approach: analytical
    handler: template
    handler_type: renderer
    prompt: "Summary: {{.Output}}"
  - name: report
    approach: holistic
    handler: llm
    handler_type: transformer
    prompt: "Final report"

edges:
  - id: e1
    name: ingest to extract
    from: ingest
    to: extract
  - id: e2
    name: extract to analyze
    from: extract
    to: analyze
  - id: e3
    name: analyze to render
    from: analyze
    to: render
  - id: e4
    name: render to report
    from: render
    to: report
  - id: e5
    name: report to done
    from: report
    to: _done

start: ingest
done: _done
