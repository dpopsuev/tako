# Multi-round probe circuit: Generator → Subject → Judge ↻
# The Judge can send the Subject back for another attempt with feedback.
# Rounds are controlled by the seed's `rounds` field. When rounds=0 or
# not set, this circuit degrades to the standard cascade.
circuit: ouroboros-probe-multiround
description: "Multi-round behavioral probe with judge feedback loop"
handler_type: node

nodes:
  - name: generate
    element: earth
    handler: ouroboros-generate
  - name: subject
    element: fire
    handler: ouroboros-subject-multiround
  - name: judge
    element: diamond
    handler: ouroboros-judge-multiround

edges:
  - id: MR1
    name: generate-to-subject
    from: generate
    to: subject
    condition: "always"
  - id: MR2
    name: subject-to-judge
    from: subject
    to: judge
    condition: "always"
  - id: MR3
    name: judge-feedback
    from: judge
    to: subject
    condition: "rounds_remaining"
  - id: MR4
    name: judge-done
    from: judge
    to: _done
    condition: "final_round"

start: generate
done: _done
