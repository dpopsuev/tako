# Ouroboros probe circuit: Generator → Subject → Judge
# Each seed YAML drives one walk of this circuit. The Generator creates
# a question from the seed, the Subject answers blindly (no rubric, no poles),
# and the Judge classifies which pole the answer aligns with.
circuit: ouroboros-probe
description: "3-node dichotomous behavioral probe circuit"
topology: cascade
handler_type: node

nodes:
  - name: generate
    element: earth
    handler: ouroboros-generate
  - name: subject
    element: fire
    handler: ouroboros-subject
  - name: judge
    element: diamond
    handler: ouroboros-judge

edges:
  - id: OP1
    name: generate-to-subject
    from: generate
    to: subject
    condition: "always"
  - id: OP2
    name: subject-to-judge
    from: subject
    to: judge
    condition: "always"
  - id: OP3
    name: judge-done
    from: judge
    to: _done
    condition: "always"

start: generate
done: _done
