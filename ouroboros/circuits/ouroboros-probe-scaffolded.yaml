# Scaffolded probe circuit: Generator → Subject → ScaffoldedJudge ↻ Hint
# The ScaffoldedJudge evaluates the response. If insufficient and hints
# remain, it routes to Hint which enriches the prompt and sends Subject
# another attempt. When hints are exhausted or the answer is sufficient,
# it routes to _done with a final PoleResult.
circuit: ouroboros-probe-scaffolded
description: "Scaffolded behavioral probe with progressive hint chain"
handler_type: node

nodes:
  - name: generate
    element: earth
    handler: ouroboros-generate
  - name: subject
    element: fire
    handler: ouroboros-subject-scaffolded
  - name: judge
    element: diamond
    handler: ouroboros-judge-scaffolded
  - name: hint
    element: water
    handler: ouroboros-hint

edges:
  - id: SC1
    name: generate-to-subject
    from: generate
    to: subject
    condition: "always"
  - id: SC2
    name: subject-to-judge
    from: subject
    to: judge
    condition: "always"
  - id: SC3
    name: judge-needs-hint
    from: judge
    to: hint
    condition: "hint_remaining"
  - id: SC4
    name: hint-to-subject
    from: hint
    to: subject
    condition: "always"
    loop: true
  - id: SC5
    name: judge-done
    from: judge
    to: _done
    condition: "final_or_exhausted"

start: generate
done: _done
