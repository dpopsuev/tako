kind: Schematic
circuit: sdlc
start: plan
done: _done
finally: teardown
description: "Fan-Out/Fan-In SDLC — cold-start gate, autonomous centrifuge, externalization gate"

nodes:
  - name: plan
    instrument: circuit
    action: planning
    description: "Cold-start gate — poll Scribe, resolve context, human approves plan"

  - name: code
    instrument: circuit
    action: coding
    description: "TDD inner loop — RED/GREEN/BLUE in isolated worktree"

  - name: verify
    instrument: circuit
    action: verifying
    description: "Centrifuge — build, test, lint, security, canary, bouncer (all autonomous)"

  - name: publish
    instrument: circuit
    action: publishing
    description: "Externalization gate — human reviews, then release mutates the world"

  - name: teardown
    instrument: transformer
    action: teardown
    description: "Cleanup worktrees, temp files, release locks"

edges:
  - id: plan-code
    from: plan
    to: code
    description: "Plan approved — start coding"

  - id: code-verify
    from: code
    to: verify
    description: "Code ready — enter centrifuge"

  - id: verify-publish
    from: verify
    to: publish
    description: "Centrifuge passed — enter externalization gate"

  - id: publish-done
    from: publish
    to: _done
    description: "Released — cycle complete"
