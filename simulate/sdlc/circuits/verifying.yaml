kind: Schematic
circuit: verifying
start: build
done: verified
description: "Autonomous centrifuge — quality gates + canary + bouncer, no HITL"

nodes:
  - name: build
    instrument: transformer
    action: build
    description: "Compile the codebase (go build ./...)"
    output:
      - name: pass
        type: bool
        required: true
      - name: output
        type: string

  - name: test
    instrument: transformer
    action: test
    description: "Run test suite (go test ./... -short)"
    output:
      - name: pass
        type: bool
        required: true
      - name: output
        type: string

  - name: lint
    instrument: transformer
    action: lint
    description: "Run golangci-lint"
    output:
      - name: pass
        type: bool
        required: true
      - name: output
        type: string

  - name: security-scan
    instrument: transformer
    action: security-scan
    description: "Vulnerability scan (osv-scanner or equivalent)"
    output:
      - name: clean
        type: bool
        required: true
      - name: findings
        type: array

  - name: deploy-canary
    instrument: transformer
    action: deploy-canary
    description: "Deploy to canary environment (blue/green, reversible)"
    output:
      - name: deployed
        type: bool
        required: true

  - name: monitor-health
    instrument: transformer
    action: monitor-health
    description: "Check canary health metrics"
    output:
      - name: healthy
        type: bool
        required: true
      - name: metrics
        type: object

  - name: rollback
    instrument: transformer
    action: rollback
    description: "Rollback canary deployment"
    output:
      - name: rolled_back
        type: bool
        required: true

  - name: file-bug
    instrument: transformer
    action: file-bug
    description: "File a bug in Scribe for the failed deployment"
    output:
      - name: bug_id
        type: string
        required: true

  - name: self-review
    instrument: transformer
    action: self-review
    description: "Bouncer — agent validates diff against spec, stamps requirements with evidence"
    output:
      - name: all_verified
        type: bool
        required: true
      - name: stamps
        type: array

edges:
  # Quality chain
  - id: build-test
    from: build
    to: test
    when: "output.pass == true"

  - id: build-fail
    from: build
    to: verified
    when: "output.pass != true"
    description: "Build failed — exit with feedback"

  - id: test-lint
    from: test
    to: lint
    when: "output.pass == true"

  - id: test-fail
    from: test
    to: verified
    when: "output.pass != true"
    description: "Tests failed — exit with feedback"

  - id: lint-security
    from: lint
    to: security-scan
    when: "output.pass == true"

  - id: lint-fail
    from: lint
    to: verified
    when: "output.pass != true"
    description: "Lint failed — exit with feedback"

  - id: security-canary
    from: security-scan
    to: deploy-canary
    when: "output.clean == true"

  - id: security-fail
    from: security-scan
    to: verified
    when: "output.clean != true"
    description: "Vulnerabilities found — exit with feedback"

  # Canary (blue/green, reversible)
  - id: canary-monitor
    from: deploy-canary
    to: monitor-health

  - id: healthy-bouncer
    from: monitor-health
    to: self-review
    when: "output.healthy == true"
    description: "Canary healthy — bouncer validates before human"

  - id: unhealthy-rollback
    from: monitor-health
    to: rollback
    when: "output.healthy != true"

  - id: rollback-bug
    from: rollback
    to: file-bug

  - id: bug-exit
    from: file-bug
    to: verified
    description: "Bug filed — feeds back to planning circuit"

  # Bouncer → exit
  - id: bouncer-pass
    from: self-review
    to: verified
    when: "output.all_verified == true"
    description: "Bouncer passed — ready for human externalization gate"

  - id: bouncer-fail
    from: self-review
    to: verified
    when: "output.all_verified != true"
    description: "Bouncer rejected — requirements not met"
