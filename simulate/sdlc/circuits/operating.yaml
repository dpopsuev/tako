kind: Schematic
circuit: operating
start: deploy-canary
done: shipped

nodes:
  - name: deploy-canary
    instrument: transformer
    action: deploy-canary
    description: "Deploy to canary environment"
    output:
      - name: deployed
        type: bool
        required: true

  - name: monitor-health
    instrument: transformer
    action: monitor-health
    description: "Check canary health metrics"
    output:
      - name: healthy
        type: bool
        required: true
      - name: metrics
        type: object

  - name: promote
    instrument: transformer
    action: promote
    description: "Promote canary to production"
    output:
      - name: promoted
        type: bool
        required: true

  - name: rollback
    instrument: transformer
    action: rollback
    description: "Rollback canary deployment"
    output:
      - name: rolled_back
        type: bool
        required: true

  - name: file-bug
    instrument: transformer
    action: file-bug
    description: "File a bug in Scribe for the failed deployment"
    output:
      - name: bug_id
        type: string
        required: true

  - name: mark-done
    instrument: transformer
    action: mark-done
    description: "Mark the Scribe task as complete"
    output:
      - name: updated
        type: bool
        required: true

edges:
  - id: deploy-monitor
    from: deploy-canary
    to: monitor-health

  - id: healthy-promote
    from: monitor-health
    to: promote
    when: "output.healthy == true"

  - id: unhealthy-rollback
    from: monitor-health
    to: rollback
    when: "output.healthy != true"

  - id: rollback-bug
    from: rollback
    to: file-bug

  - id: bug-shipped
    from: file-bug
    to: shipped
    description: "Bug filed — feeds back to planning circuit"

  - id: promote-done
    from: promote
    to: mark-done

  - id: done-shipped
    from: mark-done
    to: shipped
