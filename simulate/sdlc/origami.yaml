apiVersion: tako/v1
kind: Board
metadata:
  name: tako-sdlc
  description: "Self-reinforcing SDLC circuit for the Origami framework"
spec:
  uses:
    sdlc:
      kind: Schematic
      module: github.com/dpopsuev/tako/simulate/sdlc
      entry: true
  domain_serve:
    port: 9400
    assets:
      circuits:
        sdlc: circuits/sdlc.yaml
