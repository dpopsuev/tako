name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build-test-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        run: go build ./...

      - name: Test
        run: go test ./... -count=1 -short -timeout 120s

      - name: Lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest

      - name: Check forbidden imports
        run: |
          ! grep -r '"github.com/dpopsuev/bugle' --include='*.go' . && \
          echo "OK: no forbidden imports (bugle)"

  trigger-consumers:
    needs: build-test-lint
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        repo:
          - dpopsuev/origami-rca
          - dpopsuev/origami-gnd
    steps:
      - name: Trigger consumer rebuild
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.CROSS_REPO_TOKEN }}
          repository: ${{ matrix.repo }}
          event-type: origami-updated
          client-payload: '{"ref": "${{ github.sha }}", "branch": "${{ github.ref_name }}"}'
