apiVersion: tako/v1
kind: Instrument
metadata:
  name: locus
  namespace: instruments
  description: "Architecture analysis via Locus MCP"
spec:
  version: "2.0"
  dispatch: mcp
  tune: "curl -sf http://localhost:8080/health"
  endpoint: "http://localhost:8080/mcp"
  actions:
    scan:
      command: "scan"
      input_schema: |
        {"type": "object", "properties": {"repo_path": {"type": "string"}}}
      output_schema: |
        {"type": "object", "properties": {"components": {"type": "integer"}}}
    analysis:
      command: "analysis"
