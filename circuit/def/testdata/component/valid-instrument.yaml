apiVersion: origami/v1
kind: Instrument
metadata:
  name: oculus
  namespace: instruments
  description: "Static analysis via Oculus"
spec:
  version: "1.0"
  dispatch: cli
  binary: oculus
  tune: "--version"
  actions:
    scan:
      command: "scan --format=json"
      input_schema: |
        {"type": "object", "properties": {"repo_path": {"type": "string"}}, "required": ["repo_path"]}
      output_schema: |
        {"type": "object", "properties": {"findings": {"type": "array"}, "clean": {"type": "boolean"}}}
    layers:
      command: "layers --format=json"
      input_schema: |
        {"type": "object", "properties": {"repo_path": {"type": "string"}}}
      output_schema: |
        {"type": "object", "properties": {"layers": {"type": "array"}}}
