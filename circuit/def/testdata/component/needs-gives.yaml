apiVersion: origami/v1
kind: Component
metadata:
  name: test-ds
  module: github.com/example/schematic-a/connectors/rp
  namespace: datasource
spec:
  version: "1.0"
  needs:
    sources:
      - name: source
        type: SourceReader
        option: WithSourceReader
        optional: true
  gives:
    - socket: source
      factory: NewSourceReader
      wire: factory
