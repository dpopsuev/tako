apiVersion: origami/v1
kind: Component
metadata:
  name: test-rp
  module: github.com/dpopsuev/origami-rca/connectors/rp
  namespace: reportportal
spec:
  version: "1.0"
  needs:
    sources:
      - name: source
        type: SourceReader
        option: WithSourceReader
        optional: true
  gives:
    - socket: source
      factory: NewSourceReader
      wire: factory
