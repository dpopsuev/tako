circuit: demo
description: "Demo circuit for E2E testing"
handler_type: node
nodes:
  - name: ingest
    element: fire
    handler: ingest
  - name: triage
    element: water
    handler: classify
  - name: analyze
    element: earth
    handler: analyze
  - name: review
    element: diamond
    handler: review
edges:
  - id: E1
    name: ingested
    from: ingest
    to: triage
    when: "true"
  - id: E2
    name: triaged
    from: triage
    to: analyze
    when: "output.confidence > 0.5"
  - id: E3
    name: analyzed
    from: analyze
    to: review
    when: "true"
  - id: E4
    name: done
    from: review
    to: DONE
    when: "true"
start: ingest
done: DONE
