circuit: agentic-workflow
description: "Multi-walker agentic circuit for E2E testing"
handler_type: node
zones:
  fast:
    nodes: [scan, classify]
    element: fire
    stickiness: 2
  deep:
    nodes: [analyze, review]
    element: water
    stickiness: 1
nodes:
  - name: scan
    element: fire
    handler: scan
  - name: classify
    element: fire
    handler: classify
  - name: analyze
    element: water
    handler: analyze
  - name: review
    element: diamond
    handler: review
  - name: report
    element: earth
    handler: report
walkers:
  - name: scout
    element: fire
    persona: herald
  - name: researcher
    element: water
    persona: seeker
edges:
  - id: E1
    name: scanned
    from: scan
    to: classify
    when: "true"
  - id: E2
    name: classified
    from: classify
    to: analyze
    when: "output.needs_deep"
  - id: E3
    name: shortcut
    from: classify
    to: report
    shortcut: true
    when: "output.confidence > 0.9"
  - id: E4
    name: analyzed
    from: analyze
    to: review
    when: "true"
  - id: E5
    name: reviewed
    from: review
    to: report
    when: "true"
  - id: E6
    name: done
    from: report
    to: DONE
    when: "true"
start: scan
done: DONE
