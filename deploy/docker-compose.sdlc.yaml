# Origami SDLC Circuit Server
#
# Circuit server ONLY. Scribe and Locus are independent services —
# they have their own deployment (docker run, systemd, compose in their
# own repos). Origami connects to them via SCRIBE_ENDPOINT and LOCUS_ENDPOINT.
#
# Prerequisites:
#   make serve-image                          # builds tako-serve:latest
#   Scribe running at $SCRIBE_ENDPOINT        # e.g. http://localhost:8080/mcp
#   Locus running at $LOCUS_ENDPOINT          # e.g. http://localhost:8081/mcp
#
# Usage:
#   REPO_URL=git@github.com:user/repo.git make serve-stack
#   curl http://localhost:9100/healthz
#
# Claude Code MCP config:
#   { "tako-circuit": { "type": "http", "url": "http://localhost:9100/mcp" } }

services:
  circuit:
    image: tako-serve:latest
    mem_limit: 4g
    restart: "no"
    ports:
      - "9100:9100"
    security_opt:
      - label=disable
    extra_hosts:
      - "host.containers.internal:host-gateway"
    environment:
      - REPO_URL=${REPO_URL}
      - REPO_BRANCH=${REPO_BRANCH:-master}
      - SDLC_MODE=${SDLC_MODE:-real}
      - SDLC_PROVIDER=${SDLC_PROVIDER:-vertex-ai}
      - SDLC_MODEL=${SDLC_MODEL:-claude-sonnet-4-6}
      - SCRIBE_ENDPOINT=${SCRIBE_ENDPOINT:-http://host.containers.internal:8080/mcp}
      - LOCUS_ENDPOINT=${LOCUS_ENDPOINT:-http://host.containers.internal:8081/mcp}
      - CIRCUIT_SCOPE=${CIRCUIT_SCOPE:-tako}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - ANTHROPIC_VERTEX_PROJECT_ID=${ANTHROPIC_VERTEX_PROJECT_ID}
      - CLOUD_ML_REGION=${CLOUD_ML_REGION}
      - GOOGLE_CREDENTIALS_JSON=${GOOGLE_CREDENTIALS_JSON}
      - GIT_USER=${GIT_USER}
      - GIT_EMAIL=${GIT_EMAIL}
      - SSH_AUTH_SOCK=/ssh-agent
    volumes:
      - ${SSH_AUTH_SOCK}:/ssh-agent
      - ${HOME}/.ssh:/root/.ssh:ro
