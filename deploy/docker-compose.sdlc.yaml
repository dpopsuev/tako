# Origami SDLC Dogfood Stack
#
# 3 containers: scribe (work graph), locus (code analysis), circuit (SDLC runner)
#
# Prerequisites:
#   make serve-image   # builds origami-serve:latest
#
# Usage:
#   REPO_URL=git@github.com:user/repo.git make serve-stack
#   curl http://localhost:9100/healthz
#
# Claude Code MCP config:
#   { "origami-circuit": { "type": "http", "url": "http://localhost:9100/mcp" } }

services:
  scribe:
    image: ghcr.io/dpopsuev/scribe:${SCRIBE_TAG:-latest}
    mem_limit: 512m
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - SCRIBE_TRANSPORT=http
      - SCRIBE_ADDR=:8080
    volumes:
      - ${SCRIBE_DATA:-~/.scribe}:/data

  locus:
    image: ghcr.io/dpopsuev/locus:${LOCUS_TAG:-latest}
    mem_limit: 2g
    restart: unless-stopped
    command: ["serve", "--transport", "http", "--addr", ":8081"]
    ports:
      - "8081:8081"

  circuit:
    image: origami-serve:latest
    mem_limit: 4g
    restart: "no"
    ports:
      - "9100:9100"
    security_opt:
      - label=disable
    environment:
      - REPO_URL=${REPO_URL}
      - REPO_BRANCH=${REPO_BRANCH:-master}
      - SDLC_MODE=${SDLC_MODE:-real}
      - SDLC_PROVIDER=${SDLC_PROVIDER:-anthropic}
      - SDLC_MODEL=${SDLC_MODEL:-claude-sonnet-4-6}
      - SCRIBE_ENDPOINT=http://scribe:8080/mcp
      - LOCUS_ENDPOINT=http://locus:8081/mcp
      - GIT_USER=${GIT_USER}
      - GIT_EMAIL=${GIT_EMAIL}
      - SSH_AUTH_SOCK=/ssh-agent
    volumes:
      - ${SSH_AUTH_SOCK}:/ssh-agent
      - ${HOME}/.ssh:/root/.ssh:ro
    depends_on:
      - scribe
      - locus
