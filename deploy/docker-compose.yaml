# Origami — Local Development Stack
#
# 3 containers: asterisk (domain+rca), gnd, mediator
#
# Prerequisites:
#   cd ~/Workspace/asterisk && origami fold          # builds bin/asterisk
#   docker build -f deploy/Dockerfile.rca ~/Workspace/asterisk -t origami-rca
#   docker build -f deploy/Dockerfile.gnd ~/Workspace/rh-gnd -t origami-gnd
#   docker build -f deploy/Dockerfile.mediator . -t origami-mediator
#
# Usage:
#   docker compose -f deploy/docker-compose.yaml up -d
#   curl http://localhost:9000/healthz

services:
  rca:
    image: origami-rca
    ports:
      - "9300:9300"
    volumes:
      - ${ASTERISK_DIR:-../../asterisk}/.rp-api-key:/run/secrets/rp-api-key:ro
      - ./ca-certificates.crt:/etc/ssl/certs/ca-certificates.crt:ro
    environment:
      - ASTERISK_RP_BASE_URL=${ASTERISK_RP_BASE_URL:-}
      - ASTERISK_RP_PROJECT=${ASTERISK_RP_PROJECT:-}
      - ASTERISK_RP_API_KEY_PATH=/run/secrets/rp-api-key
    healthcheck:
      test: ["CMD", "/rca-serve", "--healthz"]
      interval: 5s
      timeout: 3s
      retries: 3

  gnd:
    image: origami-gnd
    ports:
      - "9100:9100"
    command: ["--port", "9100", "--drivers", "git,docs"]
    volumes:
      - ${STATE_DIR:-.origami/state}/gnd:/root/.local/state/gnd
    healthcheck:
      test: ["CMD", "/gnd-serve", "--healthz"]
      interval: 5s
      timeout: 3s
      retries: 3

  mediator:
    image: origami-mediator
    ports:
      - "9000:9000"
    command:
      - "--port"
      - "9000"
      - "--backend"
      - "rca=http://rca:9300/mcp"
      - "--backend"
      - "gnd:gnd=http://gnd:9100/mcp"
    depends_on:
      rca:
        condition: service_healthy
      gnd:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/mediator", "--healthz"]
      interval: 5s
      timeout: 3s
      retries: 3
