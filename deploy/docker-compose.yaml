# Origami — Local Development Stack
#
# 3 containers: asterisk (domain+rca), gnd, mediator
#
# Prerequisites:
#   cd ~/Workspace/asterisk && origami fold          # builds bin/asterisk
#   docker build -f deploy/Dockerfile.rca ~/Workspace/asterisk -t origami-rca
#   docker build -f deploy/Dockerfile.gnd ~/Workspace/origami-gnd -t origami-gnd
#   docker build -f deploy/Dockerfile.mediator . -t origami-mediator
#
# Usage:
#   docker compose -f deploy/docker-compose.yaml up -d
#   curl http://localhost:9000/healthz

services:
  rca:
    image: origami-rca
    ports:
      - "9300:9300"
    volumes:
      - ${ASTERISK_DIR:-../../asterisk}/.rp-api-key:/run/secrets/rp-api-key:ro
      - ./ca-certificates.crt:/etc/ssl/certs/ca-certificates.crt:ro
    environment:
      - ASTERISK_RP_BASE_URL=${ASTERISK_RP_BASE_URL:-}
      - ASTERISK_RP_PROJECT=${ASTERISK_RP_PROJECT:-}
      - ASTERISK_RP_API_KEY_PATH=/run/secrets/rp-api-key
      - ORIGAMI_MEDIATOR_ENDPOINT=http://mediator:9000/mcp
    healthcheck:
      test: ["CMD", "/rca-serve", "--healthz"]
      interval: 5s
      timeout: 3s
      retries: 3

  gnd:
    image: origami-gnd
    ports:
      - "9100:9100"
    command: ["--port", "9100"]
    volumes:
      - ${STATE_DIR:-.origami/state}/gnd:/root/.local/state/gnd
    environment:
      # Comma-separated list of org:token pairs for private repos.
      # Format: org1=token1,org2=token2
      # Public repos (openshift/*, openshift-kni/*, redhat-cne/*) need no token.
      - GITHUB_PRIVATE_REPO_TOKENS=${GITHUB_PRIVATE_REPO_TOKENS:-}
    healthcheck:
      test: ["CMD", "/gnd-serve", "--healthz"]
      interval: 5s
      timeout: 3s
      retries: 3

  mediator:
    image: origami-mediator
    ports:
      - "9000:9000"
    command:
      - "--port"
      - "9000"
      - "--backend"
      - "rca=http://rca:9300/mcp"
      - "--backend"
      - "gnd:gnd=http://gnd:9100/mcp"
    depends_on:
      rca:
        condition: service_healthy
      gnd:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/mediator", "--healthz"]
      interval: 5s
      timeout: 3s
      retries: 3

  worker:
    image: origami-agent-worker
    environment:
      - GATEWAY_ENDPOINT=http://mediator:9000/mcp
      - ORIGAMI_SESSION=${ORIGAMI_SESSION:-}
      - ORIGAMI_AGENT=${ORIGAMI_AGENT:-claude}
    depends_on:
      mediator:
        condition: service_healthy
    deploy:
      replicas: ${WORKER_COUNT:-0}
