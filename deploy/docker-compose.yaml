# Origami — Local Development Stack
#
# Starts domain, GND, RCA, and mediator services.
#
# Usage:
#   docker compose -f deploy/docker-compose.yaml up -d
#   curl http://localhost:9000/healthz   # verify mediator
#
# Prerequisites — build images first:
#   just build-images   (from origami repo)
#   origami fold --domain-only --container   (from asterisk repo)

services:
  domain:
    image: origami-asterisk-domain
    ports:
      - "9300:9300"
    command: ["--data-dir", "/data"]
    volumes:
      - ${ASTERISK_DATA_DIR:-../../asterisk/.data}:/data:ro
    healthcheck:
      test: ["CMD", "/domain-serve", "--healthz"]
      interval: 5s
      timeout: 3s
      retries: 3

  gnd:
    image: origami-gnd
    ports:
      - "9100:9100"
    command: ["--port", "9100", "--drivers", "git,docs"]
    healthcheck:
      test: ["CMD", "/gnd-serve", "--healthz"]
      interval: 5s
      timeout: 3s
      retries: 3

  rca:
    image: origami-rca
    ports:
      - "9200:9200"
    command:
      - "--port"
      - "9200"
      - "--domain-endpoint"
      - "http://domain:9300/mcp"
      - "--mediator-endpoint"
      - "http://mediator:9000/mcp"
    environment:
      - ASTERISK_RP_BASE_URL=${ASTERISK_RP_BASE_URL:-}
      - ASTERISK_RP_PROJECT=${ASTERISK_RP_PROJECT:-}
      - ASTERISK_RP_API_KEY_PATH=/run/secrets/rp-api-key
    volumes:
      - ${ASTERISK_DIR:-../../asterisk}/.rp-api-key:/run/secrets/rp-api-key:ro,z
      - /etc/pki/ca-trust/extracted/pem/tls-ca-bundle.pem:/etc/ssl/certs/ca-certificates.crt:ro,z
      - ${STATE_DIR:-.origami/state}:/root/.local/state/asterisk
    depends_on:
      domain:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/rca-serve", "--healthz"]
      interval: 5s
      timeout: 3s
      retries: 3

  mediator:
    image: origami-mediator
    ports:
      - "9000:9000"
    command:
      - "--port"
      - "9000"
      - "--backend"
      - "rca=http://rca:9200/mcp"
      - "--backend"
      - "gnd:gnd=http://gnd:9100/mcp"
    depends_on:
      rca:
        condition: service_healthy
      gnd:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/mediator", "--healthz"]
      interval: 5s
      timeout: 3s
      retries: 3
