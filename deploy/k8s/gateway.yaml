apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  labels:
    app: origami-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: origami-gateway
  template:
    metadata:
      labels:
        app: origami-gateway
    spec:
      containers:
        - name: gateway
          image: origami-gateway:latest
          args:
            - "--port"
            - "9000"
            - "--backend"
            - "rca=http://rca:9200/mcp"
            - "--backend"
            - "gnd=http://gnd:9100/mcp"
            - "--backend"
            - "asterisk=http://asterisk:9300/mcp"
          ports:
            - containerPort: 9000
          livenessProbe:
            httpGet:
              path: /healthz
              port: 9000
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: 9000
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: gateway
spec:
  selector:
    app: origami-gateway
  ports:
    - port: 9000
      targetPort: 9000
