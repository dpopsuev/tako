apiVersion: apps/v1
kind: Deployment
metadata:
  name: asterisk
  labels:
    app: tako-asterisk-domain
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tako-asterisk-domain
  template:
    metadata:
      labels:
        app: tako-asterisk-domain
    spec:
      containers:
        - name: asterisk
          image: tako-asterisk-domain:latest
          ports:
            - containerPort: 9300
          livenessProbe:
            httpGet:
              path: /healthz
              port: 9300
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: 9300
            initialDelaySeconds: 3
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: asterisk
spec:
  selector:
    app: tako-asterisk-domain
  ports:
    - port: 9300
      targetPort: 9300
