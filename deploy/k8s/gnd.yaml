apiVersion: apps/v1
kind: Deployment
metadata:
  name: gnd
  labels:
    app: tako-gnd
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tako-gnd
  template:
    metadata:
      labels:
        app: tako-gnd
    spec:
      containers:
        - name: gnd
          image: tako-gnd:latest
          args: ["--port", "9100", "--drivers", "git,docs"]
          ports:
            - containerPort: 9100
          livenessProbe:
            httpGet:
              path: /healthz
              port: 9100
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: 9100
            initialDelaySeconds: 3
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: gnd
spec:
  selector:
    app: tako-gnd
  ports:
    - port: 9100
      targetPort: 9100
