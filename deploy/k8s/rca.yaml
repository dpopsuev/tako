apiVersion: apps/v1
kind: Deployment
metadata:
  name: rca
  labels:
    app: origami-rca
spec:
  replicas: 1
  selector:
    matchLabels:
      app: origami-rca
  template:
    metadata:
      labels:
        app: origami-rca
    spec:
      containers:
        - name: rca
          image: origami-rca:latest
          args:
            - "--port"
            - "9200"
            - "--gnd-endpoint"
            - "http://gnd:9100/mcp"
            - "--domain-endpoint"
            - "http://asterisk:9300/mcp"
          ports:
            - containerPort: 9200
          envFrom:
            - configMapRef:
                name: origami-config
          livenessProbe:
            httpGet:
              path: /healthz
              port: 9200
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: 9200
            initialDelaySeconds: 3
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: rca
spec:
  selector:
    app: origami-rca
  ports:
    - port: 9200
      targetPort: 9200
