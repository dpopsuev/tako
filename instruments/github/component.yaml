kind: component
component: origami-github
module: github.com/dpopsuev/origami/instruments/github
namespace: github
version: "1.0.0"
description: GitHub code access — shallow clone cache, local ripgrep search, file read
provides:
  transformers: []
  hooks: []
requires:
  origami: ">=0.3.0"
satisfies:
  - socket: git
    factory: DefaultGitDriver
