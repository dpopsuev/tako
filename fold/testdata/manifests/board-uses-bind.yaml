apiVersion: origami/v1
kind: Board
metadata:
  name: consumer
spec:
  uses:
    alpha:
      kind: Schematic
      module: github.com/example/schematic-a
    datasource:
      kind: Component
      module: github.com/dpopsuev/origami-components/rp
    mcp:
      kind: Component
      module: github.com/dpopsuev/origami/instruments/mcp
  bind:
    alpha:
      data: datasource
      transport: mcp
  domains: [ocp/ptp]
  domain_serve:
    port: 9300
    assets:
      circuits:
        alpha: circuits/alpha.yaml
