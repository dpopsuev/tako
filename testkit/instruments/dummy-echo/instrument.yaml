apiVersion: tako/v1
kind: Instrument
metadata:
  name: dummy-echo
  namespace: testkit
  description: "Echo stdin to stdout — proves exec dispatch works"
spec:
  dispatch: cli
  binary: bash
  tune: "--version"
  actions:
    echo:
      command: "testkit/instruments/dummy-echo/echo.sh"
      input_schema: |
        {"type": "object", "properties": {"message": {"type": "string"}}}
      output_schema: |
        {"type": "object", "properties": {"echo": {"type": "string"}}}
