apiVersion: origami/v1
kind: Instrument
metadata:
  name: dummy-upper
  namespace: testkit
  description: "Uppercases JSON input — compiled Go binary proves language-agnostic dispatch"
spec:
  dispatch: cli
  binary: testkit/instruments/dummy-upper/dummy-upper
  tune: "< /dev/null"
  actions:
    upper:
      command: "upper"
      input_schema: |
        {"type": "object", "properties": {"text": {"type": "string"}}}
      output_schema: |
        {"type": "object", "properties": {"upper": {"type": "string"}}, "required": ["upper"]}
