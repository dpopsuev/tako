apiVersion: origami/v1
kind: Instrument
metadata:
  name: dummy-fail
  namespace: testkit
  description: "Always exits 1 — proves error handling works"
spec:
  dispatch: cli
  binary: bash
  tune: "--version"
  actions:
    fail:
      command: "testkit/instruments/dummy-fail/fail.sh"
      input_schema: |
        {"type": "object"}
      output_schema: |
        {"type": "object"}
