apiVersion: origami/v1
kind: Instrument
metadata:
  name: dummy-badoutput
  namespace: testkit
  description: "Returns JSON missing required field — proves output schema enforcement"
spec:
  dispatch: cli
  binary: dummy-badoutput
  tune: "< /dev/null"
  actions:
    run:
      command: "run"
      input_schema: |
        {"type": "object"}
      output_schema: |
        {"type": "object", "required": ["status"], "properties": {"status": {"type": "string"}}}
